<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ủng Hộ / Donate Phuong Tran</title>
    <!-- Nhúng Tailwind CSS để làm giao diện nhanh -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen flex flex-col items-center justify-center p-4">

    <div class="w-full max-w-md bg-white rounded-2xl shadow-xl p-6 text-center">
        <!-- Avatar & Thông tin -->
        <div class="mb-6">
            <div class="w-24 h-24 bg-indigo-600 rounded-full mx-auto flex items-center justify-center text-white text-3xl font-bold shadow-md">
                🎁
            </div>
            <h1 class="text-2xl font-bold mt-4 text-slate-900">Cảm Ơn Sự Ủng Hộ Của Bạn</h1>
            <p class="text-sm text-slate-500 mt-2">Sự đóng góp của bạn là động lực rất lớn để mình tiếp tục sáng tạo nội dung.</p>
        </div>

        <!-- Nơi các nút link sẽ tự động nhảy vào đây -->
        <div id="links-container" class="space-y-4">
            <p class="text-slate-400 text-sm animate-pulse">Đang tải danh sách phương thức...</p>
        </div>

        <!-- Footer -->
        <div class="mt-8 pt-4 border-t border-slate-100 text-xs text-slate-400">
            © 2026 • PhuongTranLangIT (<a href="mailto:phuongtranlangit@gmail.com">phuongtranlangit@gmail.com</a>)
        </div>
    </div>

    <!-- Đoạn JS để tự động đọc file json và render ra màn hình -->
    <script>
        async function loadLinks() {
            try {
                // Đọc file data.json (thêm tham số timestamp để tránh bị trình duyệt lưu cache cũ khi bạn update)
                const response = await fetch('data.json?t=' + new Date().getTime());
                const links = await response.json();
                
                const container = document.getElementById('links-container');
                container.innerHTML = ''; // Xóa dòng chữ "Đang tải..."

                links.forEach(link => {
                    const a = document.createElement('a');
                    a.href = link.url;
                    a.target = '_blank';
                    a.className = 'flex items-center p-4 border border-slate-200 rounded-xl hover:border-indigo-500 hover:bg-indigo-50/50 transition-all duration-200 text-left group shadow-sm';
                    
                    a.innerHTML = `
                        <div class="text-2xl mr-4 bg-slate-100 p-2 rounded-lg group-hover:bg-indigo-100 transition-colors">${link.icon || '🔗'}</div>
                        <div class="flex-1">
                            <div class="font-semibold text-slate-900 group-hover:text-indigo-600 transition-colors">${link.name}</div>
                            <div class="text-xs text-slate-500 mt-0.5">${link.description}</div>
                        </div>
                        <div class="text-slate-300 group-hover:text-indigo-500 transition-colors">➔</div>
                    `;
                    container.appendChild(a);
                });
            } catch (error) {
                console.error('Lỗi tải link:', error);
                document.getElementById('links-container').innerHTML = 
                    '<p class="text-red-500 text-sm">Không thể tải danh sách donate. Vui lòng thử lại sau!</p>';
            }
        }

        // Chạy hàm khi trang web tải xong
        window.addEventListener('DOMContentLoaded', loadLinks);
    </script>
</body>
</html>
